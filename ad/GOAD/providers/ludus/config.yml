ludus:
  - vm_name: "{{ range_id }}-GOAD-DC01"
    hostname: "{{ range_id }}-DC01"
    template: win2019-server-x64-template
    vlan: 10
    ip_last_octet: 10
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: true
    roles:
      - ludus_enable_mdi_gpo
      - bagelbyt3s.ludus_adfs.import_root_cert
    role_vars:
      adfs_CA: "sevenkingdoms-KINGSLANDING-CA"
